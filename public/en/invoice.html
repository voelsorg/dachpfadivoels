<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice – Scouts V&ouml;ls Fundraiser</title>
  <link rel="alternate" hreflang="de" href="https://baustein.pfadivoels.at/rechnung.html">
  <link rel="alternate" hreflang="en" href="https://baustein.pfadivoels.at/en/invoice.html">
  <link rel="alternate" hreflang="x-default" href="https://baustein.pfadivoels.at/rechnung.html">
  <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --pfadi-rot:#9B1B30; --pfadi-rot-light:#B82E44; --grau:#3C3C3C; --grau-l:#6B6B6B; --grau-bg:#F4F2F0; --warm:#FAF7F5; --font:'Kumbh Sans',sans-serif; }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font);color:var(--grau);background:#fff;line-height:1.6;padding:2rem}
    .inv-wrap{max-width:700px;margin:0 auto;font-family:var(--font)}
    .inv-header{display:flex;justify-content:space-between;margin-bottom:2rem}
    .inv-header h2{font-size:1.5rem;color:var(--pfadi-rot);text-transform:uppercase;margin:0}
    .inv-meta{text-align:right;font-size:.85rem;color:var(--grau-l)}
    .inv-addresses{display:grid;grid-template-columns:1fr 1fr;gap:2rem;margin-bottom:2rem}
    .inv-addr h4{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--grau-l);margin-bottom:.5rem}
    .inv-addr p{font-size:.9rem;line-height:1.6}
    .inv-table{width:100%;border-collapse:collapse;margin-bottom:0;min-width:0;table-layout:fixed}
    .inv-table th{background:var(--grau-bg);padding:.6rem .75rem;font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;text-align:left;border-bottom:2px solid var(--pfadi-rot);color:var(--grau)}
    .inv-table td{padding:.6rem .75rem;border-bottom:1px solid #eee;font-size:.9rem}
    .inv-table .right{text-align:right}
    .inv-total td{font-weight:700;border-top:2px solid var(--pfadi-rot);font-size:1rem}
    .inv-payment{background:var(--grau-bg);padding:1.25rem;border-radius:4px;margin-top:0;width:100%}
    .inv-payment h4{font-size:.8rem;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.75rem;color:var(--pfadi-rot)}
    .inv-pay-grid{display:grid;grid-template-columns:1fr;gap:.5rem;min-width:0;overflow:hidden}
    .inv-pay-table{border-collapse:collapse;font-size:.85rem;width:100%;min-width:0}
    .inv-pay-table td{padding:.15rem 0;vertical-align:top}
    .inv-pay-table td:first-child{font-weight:700;white-space:nowrap;padding-right:1rem}
    .inv-qr{text-align:center;margin-top:.5rem}
    .inv-qr img{display:block;margin:0 auto}
    .inv-footer{margin-top:2rem;padding-top:1rem;border-top:1px solid #ddd;font-size:.8rem;color:var(--grau-l);text-align:center}
    .inv-actions{margin-top:1.5rem;text-align:center}
    .btn{padding:.55rem 1.1rem;border:none;border-radius:3px;font-family:var(--font);font-weight:600;font-size:.82rem;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:.04em}
    .btn-primary{background:var(--pfadi-rot);color:#fff}.btn-primary:hover{background:var(--pfadi-rot-light)}
    .status-msg{max-width:500px;margin:4rem auto;text-align:center;font-size:1rem;color:var(--grau-l)}
    .status-msg h2{color:var(--pfadi-rot);margin-bottom:1rem}
    @media print { .inv-actions{display:none!important} .lang-switch{display:none!important} body{padding:0} }
    @media(max-width:600px){ .inv-addresses{grid-template-columns:1fr} .inv-header{flex-direction:column;gap:1rem} }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
</head>
<body>
  <div class="lang-switch" style="text-align:right;max-width:700px;margin:0 auto;padding:0.5rem 0 0"><a href="javascript:void(0)" style="font-family:var(--font);font-size:.8rem;font-weight:600;color:var(--pfadi-rot);text-decoration:none;padding:.3rem .6rem;border:2px solid var(--pfadi-rot);border-radius:2rem" onclick="var t=new URLSearchParams(location.search).get('token');location.href='/rechnung.html?token='+encodeURIComponent(t)">DE</a></div>
  <div id="loading" class="status-msg"><p>Loading invoice...</p></div>
  <div id="error" class="status-msg" style="display:none"><h2>Invoice not found</h2><p>The link is invalid or the order no longer exists.</p></div>
  <div id="invoice" class="inv-wrap" style="display:none"></div>
  <script>
    const PRICE=30;
    const SHIP_LABEL={versand_at:'Shipping AT',versand_eu:'Shipping EU',versand_welt:'Worldwide Shipping',abholung:'Pick-up'};
    function esc(s){if(!s)return '';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

    async function loadInvoice(){
      const params=new URLSearchParams(location.search);
      const token=params.get('token');
      if(!token){showError();return;}

      try{
        const resp=await fetch('/api/invoice/'+encodeURIComponent(token));
        if(!resp.ok){showError();return;}
        const order=await resp.json();
        renderInvoice(order);
      }catch{
        showError();
      }
    }

    function showError(){
      document.getElementById('loading').style.display='none';
      document.getElementById('error').style.display='block';
    }

    function renderInvoice(o){
      const bank=o.bank||{};
      const art=o.anzahl*PRICE,gesamt=art+(o.versand||0);
      const nr='BA-2026-'+String(o.id).padStart(3,'0');
      const heute=o.created_at?new Date(o.created_at+'Z').toLocaleDateString('en-GB'):new Date().toLocaleDateString('en-GB');
      const empf=bank.name||'';
      const iban=(bank.iban||'').replace(/\s/g,''),bic=(bank.bic||'').replace(/\s/g,'');
      const vzweck='Bausteinaktion '+nr+' '+o.vorname+' '+o.nachname;

      const el=document.getElementById('invoice');
      el.innerHTML=`
        <div class="inv-header"><div><img src="/logo-voels.png" alt="Scouts V&ouml;ls" style="height:auto;width:220px;display:block;margin-bottom:.75rem"><h2>Invoice</h2><p style="font-size:.85rem;color:var(--grau-l);margin-top:.3rem">Fundraiser – Scouts V&ouml;ls</p></div>
        <div class="inv-meta"><p><strong>No.:</strong> ${nr}</p><p><strong>Date:</strong> ${heute}</p></div></div>
        <div class="inv-addresses">
          <div class="inv-addr"><h4>From</h4><p><strong>${esc(empf)}</strong><br>Buch 1, 6176 V&ouml;ls, Austria<br>baustein@pfadivoels.at</p></div>
          <div class="inv-addr"><h4>To</h4><p><strong>${esc(o.vorname)} ${esc(o.nachname)}</strong><br>${o.email?esc(o.email)+'<br>':''}${o.adresse?(esc(o.adresse)+'<br>'):''}</p></div>
        </div>
        <table class="inv-table"><thead><tr><th style="width:7%">Pos.</th><th>Description</th><th class="right" style="width:12%">Qty</th><th class="right" style="width:16%">Unit price</th><th class="right" style="width:14%">Amount</th></tr></thead><tbody>
          <tr><td>1</td><td>Art print &ldquo;BiPi&rdquo; &ndash; A3, hand-signed &amp; numbered<br><small style="color:var(--grau-l)">Artist: Markus Manfreda</small></td><td class="right">${o.anzahl}</td><td class="right">&euro; 30.00</td><td class="right">&euro; ${art.toFixed(2)}</td></tr>
          ${o.versand>0?`<tr><td>2</td><td>${SHIP_LABEL[o.zustellung]||'Shipping'}</td><td class="right">1</td><td class="right">&euro; ${o.versand.toFixed(2)}</td><td class="right">&euro; ${o.versand.toFixed(2)}</td></tr>`:''}
          <tr class="inv-total"><td colspan="4"><strong>Total</strong></td><td class="right"><strong>&euro; ${gesamt.toFixed(2)}</strong></td></tr>
        </tbody></table>
        <div class="inv-payment"><h4>Payment information – Bank transfer</h4>
          <div class="inv-pay-grid"><table class="inv-pay-table">
            <tr><td>Recipient:</td><td>${esc(empf)}</td></tr>
            <tr><td>IBAN:</td><td>${esc(bank.iban||'')}</td></tr>
            <tr><td>BIC:</td><td>${esc(bank.bic||'')}</td></tr>
            <tr><td>Amount:</td><td>&euro; ${gesamt.toFixed(2)}</td></tr>
            <tr><td>Reference:</td><td>${esc(vzweck)}</td></tr>
          </table><div class="inv-qr" id="invoiceQR"></div></div></div>
        <div class="inv-footer"><p>Scout Group V&ouml;ls &middot; Buch 1, 6176 V&ouml;ls, Austria &middot; Member of PP&Ouml; &middot; Scouts Austria, Tyrol &middot; baustein.pfadivoels.at</p></div>
        <div class="inv-actions"><button class="btn btn-primary" onclick="window.print()">Print / PDF</button></div>`;

      document.getElementById('loading').style.display='none';
      el.style.display='block';

      // EPC QR Code (generated client-side)
      const epc=['BCD','002','1','SCT',bic,empf,iban,'EUR'+gesamt.toFixed(2),'','',vzweck,''].join('\n');
      const qrEl=document.getElementById('invoiceQR');
      const qr=qrcode(0,'M');qr.addData(epc);qr.make();
      const qrImg=document.createElement('img');
      qrImg.width=150;qrImg.height=150;qrImg.alt='EPC QR Code';
      qrImg.src=qr.createDataURL(4,0);
      qrEl.appendChild(qrImg);
      const s=document.createElement('small');s.textContent='Scan QR code to pay';
      s.style.cssText='font-size:.7rem;color:var(--grau-l);margin-top:.3rem;display:block;text-align:center';qrEl.appendChild(s);
    }

    loadInvoice();
  </script>
</body>
</html>
