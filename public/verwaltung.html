<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verwaltung – Bausteinaktion Pfadis Völs</title>
  <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --pfadi-rot:#9B1B30; --pfadi-rot-light:#B82E44; --grau:#3C3C3C; --grau-l:#6B6B6B; --grau-bg:#F4F2F0; --warm:#FAF7F5; --green:#2D8544; --green-bg:#E8F5E9; --orange:#E67E22; --orange-bg:#FFF3E0; --font:'Kumbh Sans',sans-serif; }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font);color:var(--grau);background:var(--grau-bg);line-height:1.6}
    .topbar{background:var(--grau);color:#fff;padding:.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .topbar h1{font-size:1rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
    .topbar a{color:rgba(255,255,255,.7);font-size:.82rem;text-decoration:none}
    .topbar a:hover{color:#fff}
    .app{max-width:1200px;margin:0 auto;padding:1.5rem}
    .login-card{background:#fff;border-radius:8px;padding:2.5rem;max-width:400px;margin:4rem auto;box-shadow:0 8px 40px rgba(0,0,0,.08);border-top:4px solid var(--pfadi-rot);text-align:center}
    .login-card h2{font-size:1.2rem;margin-bottom:1rem;color:var(--pfadi-rot);text-transform:uppercase;letter-spacing:.04em}
    .login-card p{font-size:.88rem;color:var(--grau-l);margin-bottom:1.5rem}
    .login-card input{width:100%;padding:.7rem .9rem;border:2px solid #E0DDD9;border-radius:3px;font-family:var(--font);font-size:.95rem;margin-bottom:1rem}
    .login-card input:focus{outline:none;border-color:var(--pfadi-rot)}
    .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem}
    .stat-card{background:#fff;border-radius:6px;padding:1.25rem;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.05)}
    .stat-card .num{font-size:2rem;font-weight:800;color:var(--pfadi-rot);line-height:1}
    .stat-card .lbl{font-size:.75rem;text-transform:uppercase;letter-spacing:.06em;color:var(--grau-l);margin-top:.3rem}
    .stat-card.green .num{color:var(--green)}
    .toolbar{display:flex;gap:.75rem;margin-bottom:1rem;align-items:center;flex-wrap:wrap}
    .btn{padding:.55rem 1.1rem;border:none;border-radius:3px;font-family:var(--font);font-weight:600;font-size:.82rem;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:.04em}
    .btn-primary{background:var(--pfadi-rot);color:#fff}.btn-primary:hover{background:var(--pfadi-rot-light)}
    .btn-secondary{background:#E0DDD9;color:var(--grau)}.btn-secondary:hover{background:#D0CDC9}
    .btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#24703A}
    .btn-sm{padding:.35rem .7rem;font-size:.75rem}
    .toolbar-spacer{flex:1}
    .search-input{padding:.5rem .8rem;border:2px solid #E0DDD9;border-radius:3px;font-family:var(--font);font-size:.85rem;width:220px}
    .search-input:focus{outline:none;border-color:var(--pfadi-rot)}
    .table-wrap{background:#fff;border-radius:6px;overflow-x:auto;box-shadow:0 2px 8px rgba(0,0,0,.05)}
    table{width:100%;border-collapse:collapse;min-width:800px}
    th{background:var(--grau);color:#fff;padding:.7rem .75rem;font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;text-align:left;font-weight:600;white-space:nowrap}
    td{padding:.65rem .75rem;border-bottom:1px solid var(--grau-bg);font-size:.88rem;vertical-align:middle}
    tr:hover td{background:rgba(155,27,48,.02)}
    .badge{display:inline-block;padding:.2rem .6rem;border-radius:2rem;font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
    .badge-offen{background:var(--orange-bg);color:var(--orange)}
    .badge-bezahlt{background:var(--green-bg);color:var(--green)}
    .badge-versendet{background:#E3F2FD;color:#1565C0}
    .actions{display:flex;gap:.4rem;flex-wrap:wrap}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
    .modal-overlay.open{display:flex}
    .modal{background:#fff;border-radius:8px;padding:2rem;max-width:550px;width:95%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
    .modal h3{font-size:1.1rem;font-weight:700;margin-bottom:1.25rem;color:var(--pfadi-rot);text-transform:uppercase;letter-spacing:.04em}
    .modal .form-group{margin-bottom:1rem}
    .modal label{display:block;font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--grau-l);margin-bottom:.25rem}
    .modal input,.modal select,.modal textarea{width:100%;padding:.55rem .7rem;border:2px solid #E0DDD9;border-radius:3px;font-family:var(--font);font-size:.9rem}
    .modal textarea{min-height:60px;resize:vertical}
    .modal input:focus,.modal select:focus{outline:none;border-color:var(--pfadi-rot)}
    .modal-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
    .modal-actions{display:flex;gap:.75rem;margin-top:1.5rem;justify-content:flex-end}
    .inv-overlay{display:none;position:fixed;inset:0;background:#fff;z-index:300;overflow:auto;padding:2rem}
    .inv-overlay.open{display:block}
    .inv-wrap{max-width:700px;margin:0 auto;font-family:var(--font)}
    .inv-header{display:flex;justify-content:space-between;margin-bottom:2rem}
    .inv-header h2{font-size:1.5rem;color:var(--pfadi-rot);text-transform:uppercase;margin:0}
    .inv-meta{text-align:right;font-size:.85rem;color:var(--grau-l)}
    .inv-addresses{display:grid;grid-template-columns:1fr 1fr;gap:2rem;margin-bottom:2rem}
    .inv-addr h4{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--grau-l);margin-bottom:.5rem}
    .inv-addr p{font-size:.9rem;line-height:1.6}
    .inv-table{width:100%;border-collapse:collapse;margin-bottom:0;min-width:0;table-layout:fixed}
    .inv-table th{background:var(--grau-bg);padding:.6rem .75rem;font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;text-align:left;border-bottom:2px solid var(--pfadi-rot);color:var(--grau)}
    .inv-table td{padding:.6rem .75rem;border-bottom:1px solid #eee;font-size:.9rem}
    .inv-table .right{text-align:right}
    .inv-total td{font-weight:700;border-top:2px solid var(--pfadi-rot);font-size:1rem}
    .inv-payment{background:var(--grau-bg);padding:1.25rem;border-radius:4px;margin-top:0;width:100%}
    .inv-payment h4{font-size:.8rem;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.75rem;color:var(--pfadi-rot)}
    .inv-pay-grid{display:grid;grid-template-columns:1fr;gap:.5rem;min-width:0;overflow:hidden}
    .inv-pay-table{border-collapse:collapse;font-size:.85rem;width:100%;min-width:0}
    .inv-pay-table td{padding:.15rem 0;vertical-align:top}
    .inv-pay-table td:first-child{font-weight:700;white-space:nowrap;padding-right:1rem}
    .inv-qr{text-align:center;margin-top:.5rem}
    .inv-qr canvas,.inv-qr img,.inv-qr table{display:block;margin:0 auto}
    .inv-footer{margin-top:2rem;padding-top:1rem;border-top:1px solid #ddd;font-size:.8rem;color:var(--grau-l);text-align:center}
    .inv-actions{margin-top:1.5rem;text-align:center}
    @media print { .topbar,.app,.inv-actions{display:none!important} .inv-overlay{position:static!important;padding:0!important} }
    @media(max-width:768px){ .config-grid{grid-template-columns:1fr} .stats-row{grid-template-columns:1fr 1fr} .modal-row{grid-template-columns:1fr} }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>🔒 Verwaltung – Bausteinaktion</h1>
    <a href="/">← Zur Bestellseite</a>
  </div>
  <div id="loginView">
    <div class="login-card">
      <h2>🔑 Admin-Zugang</h2>
      <p>Passwort eingeben, um die Bestellungen zu verwalten.</p>
      <input type="password" id="tokenInput" placeholder="Admin-Passwort">
      <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Einloggen</button>
    </div>
  </div>
  <div class="app" id="mainApp" style="display:none">
    <div class="stats-row">
      <div class="stat-card"><div class="num" id="statTotal">0</div><div class="lbl">Bestellungen</div></div>
      <div class="stat-card"><div class="num" id="statDrucke">0</div><div class="lbl">Drucke bestellt</div></div>
      <div class="stat-card green"><div class="num" id="statBezahlt">0</div><div class="lbl">Bezahlt</div></div>
      <div class="stat-card green"><div class="num" id="statEinnahmen">€ 0</div><div class="lbl">Einnahmen</div></div>
    </div>
    <div class="toolbar">
      <button class="btn btn-primary" onclick="openAddModal()">+ Neue Bestellung</button>
      <input type="text" class="search-input" id="searchInput" placeholder="Suchen …" oninput="renderTable()">
      <div class="toolbar-spacer"></div>
      <button class="btn btn-secondary" onclick="exportCSV()">📥 CSV Export</button>
      <button class="btn btn-secondary" onclick="loadOrders()">🔄 Aktualisieren</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>#</th><th>Datum</th><th>Name</th><th>E-Mail</th><th>Anz.</th><th>Zustellung</th><th>Gesamt</th><th>Status</th><th>Aktionen</th></tr></thead>
        <tbody id="orderTableBody"></tbody>
      </table>
    </div>
  </div>
  <div class="modal-overlay" id="orderModal">
    <div class="modal">
      <h3 id="modalTitle">Neue Bestellung</h3>
      <input type="hidden" id="editId">
      <div class="modal-row">
        <div class="form-group"><label>Vorname *</label><input type="text" id="mVorname"></div>
        <div class="form-group"><label>Nachname *</label><input type="text" id="mNachname"></div>
      </div>
      <div class="form-group"><label>E-Mail</label><input type="email" id="mEmail"></div>
      <div class="modal-row">
        <div class="form-group"><label>Anzahl</label><input type="number" id="mAnzahl" min="1" value="1"></div>
        <div class="form-group"><label>Zustellung</label>
          <select id="mZustellung">
            <option value="versand_at">Versand AT (+ € 5)</option>
            <option value="versand_eu">Versand EU (+ € 11)</option>
            <option value="versand_welt">Versand Weltweit</option>
            <option value="abholung">Selbstabholung</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label>Adresse</label><textarea id="mAdresse" placeholder="Straße, PLZ Ort, Land"></textarea></div>
      <div class="modal-row">
        <div class="form-group"><label>Versandkosten (€)</label><input type="number" id="mVersand" min="0" step="0.01" value="5"></div>
        <div class="form-group"><label>Status</label>
          <select id="mStatus"><option value="offen">Offen</option><option value="bezahlt">Bezahlt</option><option value="versendet">Versendet</option></select>
        </div>
      </div>
      <div class="form-group"><label>Anmerkung</label><textarea id="mAnmerkung"></textarea></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal()">Abbrechen</button>
        <button class="btn btn-primary" onclick="saveOrder()">Speichern</button>
      </div>
    </div>
  </div>
  <div class="inv-overlay" id="invoiceOverlay"></div>
  <script>
    const PRICE=30;
    const SHIP={versand_at:5,versand_eu:11,versand_welt:0,abholung:0};
    const SHIP_LABEL={versand_at:'Versand AT',versand_eu:'Versand EU',versand_welt:'Versand Weltweit',abholung:'Selbstabholung'};
    let TOKEN='',orders=[],BANK={};

    function api(path,opts={}){
      opts.headers={...opts.headers,'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'};
      return fetch(path,opts);
    }
    function doLogin(){
      TOKEN=document.getElementById('tokenInput').value.trim();
      if(!TOKEN)return;
      sessionStorage.setItem('pfadi_token',TOKEN);
      loadOrders().then(async ok=>{
        if(ok){
          try{const cr=await api('/api/config');if(cr.ok){const cd=await cr.json();BANK=cd.bank||{};}}catch{}
          document.getElementById('loginView').style.display='none';document.getElementById('mainApp').style.display='block';
        }else{alert('Zugang verweigert – falsches Passwort?');}
      });
    }
    document.getElementById('tokenInput').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
    const saved=sessionStorage.getItem('pfadi_token');
    if(saved){TOKEN=saved;document.getElementById('tokenInput').value=TOKEN;doLogin();}

    async function loadOrders(){
      try{const r=await api('/api/orders');if(!r.ok)return false;orders=await r.json();renderTable();updateStats();return true;}catch{return false;}
    }
    function updateStats(){
      const paid=orders.filter(o=>o.status==='bezahlt'||o.status==='versendet');
      document.getElementById('statTotal').textContent=orders.length;
      document.getElementById('statDrucke').textContent=orders.reduce((s,o)=>s+(o.anzahl||0),0);
      document.getElementById('statBezahlt').textContent=paid.length;
      document.getElementById('statEinnahmen').textContent='€ '+paid.reduce((s,o)=>s+o.anzahl*PRICE+(o.versand||0),0);
    }
    function renderTable(){
      const q=(document.getElementById('searchInput').value||'').toLowerCase();
      const f=orders.filter(o=>!q||(o.vorname+' '+o.nachname+' '+o.email+' '+(o.anmerkung||'')).toLowerCase().includes(q));
      document.getElementById('orderTableBody').innerHTML=f.map(o=>{
        const g=o.anzahl*PRICE+(o.versand||0);
        const sc=o.status==='bezahlt'?'badge-bezahlt':o.status==='versendet'?'badge-versendet':'badge-offen';
        const sl=o.status==='bezahlt'?'Bezahlt':o.status==='versendet'?'Versendet':'Offen';
        const d=o.created_at?new Date(o.created_at+'Z').toLocaleDateString('de-AT'):'–';
        return `<tr><td>${o.id}</td><td>${d}</td><td><strong>${o.vorname} ${o.nachname}</strong></td><td>${o.email||'–'}</td><td>${o.anzahl}×</td><td>${SHIP_LABEL[o.zustellung]||o.zustellung}</td><td><strong>€ ${g},–</strong></td><td><span class="badge ${sc}">${sl}</span></td><td class="actions">${o.status==='offen'?`<button class="btn btn-green btn-sm" onclick="setStatus(${o.id},'bezahlt')" title="Bezahlt">✓</button>`:''}${o.status==='bezahlt'?`<button class="btn btn-sm" style="background:#1565C0;color:#fff" onclick="setStatus(${o.id},'versendet')" title="Versendet">📦</button>`:''}<button class="btn btn-secondary btn-sm" onclick="showInvoice(${o.id})" title="Rechnung">🧾</button><button class="btn btn-secondary btn-sm" onclick="sendInvoiceEmail(${o.id})" title="Rechnung senden">📧</button><button class="btn btn-secondary btn-sm" onclick="editOrder(${o.id})" title="Bearbeiten">✏️</button><button class="btn btn-secondary btn-sm" onclick="deleteOrder(${o.id})" title="Löschen">🗑️</button></td></tr>`;
      }).join('');
    }
    async function setStatus(id,status){await api('/api/orders/'+id,{method:'PATCH',body:JSON.stringify({status})});loadOrders();}
    async function deleteOrder(id){if(!confirm('Bestellung #'+id+' wirklich löschen?'))return;await api('/api/orders/'+id,{method:'DELETE'});loadOrders();}
    async function sendInvoiceEmail(id){
      const o=orders.find(x=>x.id===id);if(!o)return;
      if(!o.email){alert('Keine E-Mail-Adresse hinterlegt!');return;}
      if(o.zustellung==='versand_welt'&&(!o.versand||o.versand<=0)){alert('Bitte zuerst Versandkosten eintragen (Bestellung bearbeiten).');return;}
      const nr='BA-2026-'+String(o.id).padStart(3,'0');
      if(!confirm('Rechnungs-E-Mail für '+nr+' an '+o.email+' senden?'))return;
      try{
        const resp=await api('/api/orders/'+id+'/send-invoice',{method:'POST'});
        if(resp.ok){alert('Rechnungs-E-Mail wurde gesendet!');}
        else{const err=await resp.json();alert('Fehler: '+(err.error||'Unbekannter Fehler'));}
      }catch{alert('Fehler beim Senden der E-Mail.');}
    }

    function openAddModal(){
      document.getElementById('modalTitle').textContent='Neue Bestellung';
      document.getElementById('editId').value='';
      ['mVorname','mNachname','mEmail','mAdresse','mAnmerkung'].forEach(id=>document.getElementById(id).value='');
      document.getElementById('mAnzahl').value=1;document.getElementById('mZustellung').value='versand_at';
      document.getElementById('mVersand').value=5;document.getElementById('mStatus').value='offen';
      document.getElementById('orderModal').classList.add('open');
    }
    function editOrder(id){
      const o=orders.find(x=>x.id===id);if(!o)return;
      document.getElementById('modalTitle').textContent='Bestellung #'+id+' bearbeiten';
      document.getElementById('editId').value=id;
      document.getElementById('mVorname').value=o.vorname;document.getElementById('mNachname').value=o.nachname;
      document.getElementById('mEmail').value=o.email||'';document.getElementById('mAnzahl').value=o.anzahl;
      document.getElementById('mZustellung').value=o.zustellung;document.getElementById('mVersand').value=o.versand||0;
      document.getElementById('mAdresse').value=o.adresse||'';document.getElementById('mStatus').value=o.status||'offen';
      document.getElementById('mAnmerkung').value=o.anmerkung||'';
      document.getElementById('orderModal').classList.add('open');
    }
    function closeModal(){document.getElementById('orderModal').classList.remove('open');}
    async function saveOrder(){
      const editId=document.getElementById('editId').value;
      const data={vorname:document.getElementById('mVorname').value.trim(),nachname:document.getElementById('mNachname').value.trim(),
        email:document.getElementById('mEmail').value.trim(),anzahl:parseInt(document.getElementById('mAnzahl').value)||1,
        zustellung:document.getElementById('mZustellung').value,versand:parseFloat(document.getElementById('mVersand').value)||0,
        adresse:document.getElementById('mAdresse').value.trim(),status:document.getElementById('mStatus').value,
        anmerkung:document.getElementById('mAnmerkung').value.trim()};
      if(!data.vorname||!data.nachname){alert('Name ist Pflichtfeld!');return;}
      if(editId){await api('/api/orders/'+editId,{method:'PATCH',body:JSON.stringify(data)});}
      else{await api('/api/orders',{method:'POST',body:JSON.stringify(data)});}
      closeModal();loadOrders();
    }
    document.getElementById('mZustellung').addEventListener('change',function(){document.getElementById('mVersand').value=SHIP[this.value]||0;});
    document.getElementById('orderModal').addEventListener('click',function(e){if(e.target===this)closeModal();});

    function showInvoice(id){
      const o=orders.find(x=>x.id===id);if(!o)return;
      const art=o.anzahl*PRICE,gesamt=art+(o.versand||0);
      const nr='BA-2026-'+String(o.id).padStart(3,'0'),heute=new Date().toLocaleDateString('de-AT');
      const empf=BANK.name||'';
      const iban=(BANK.iban||'').replace(/\s/g,''),bic=(BANK.bic||'').replace(/\s/g,'');
      const vzweck='Bausteinaktion '+nr+' '+o.vorname+' '+o.nachname;
      const el=document.getElementById('invoiceOverlay');
      el.innerHTML=`<div class="inv-wrap">
        <div class="inv-header"><div><img src="/logo-voels.png" alt="Pfadis Völs" style="height:auto;width:220px;display:block;margin-bottom:.75rem"><h2>Rechnung</h2><p style="font-size:.85rem;color:var(--grau-l);margin-top:.3rem">Bausteinaktion – Pfadis Völs</p></div>
        <div class="inv-meta"><p><strong>Nr.:</strong> ${nr}</p><p><strong>Datum:</strong> ${heute}</p></div></div>
        <div class="inv-addresses">
          <div class="inv-addr"><h4>Von</h4><p><strong>${empf}</strong><br>Buch 1, 6176 Völs<br>baustein@pfadivoels.at</p></div>
          <div class="inv-addr"><h4>An</h4><p><strong>${o.vorname} ${o.nachname}</strong><br>${o.email?o.email+'<br>':''}${o.adresse?(o.adresse+'<br>'):''}</p></div>
        </div>
        <table class="inv-table"><thead><tr><th style="width:7%">Pos.</th><th>Beschreibung</th><th class="right" style="width:12%">Menge</th><th class="right" style="width:16%">Einzelpreis</th><th class="right" style="width:14%">Betrag</th></tr></thead><tbody>
          <tr><td>1</td><td>Kunstdruck „BiPi" – A3, handsigniert &amp; nummeriert<br><small style="color:var(--grau-l)">Künstler: Markus Manfreda</small></td><td class="right">${o.anzahl}</td><td class="right">€ 30,00</td><td class="right">€ ${art.toFixed(2).replace('.',',')}</td></tr>
          ${o.versand>0?`<tr><td>2</td><td>${SHIP_LABEL[o.zustellung]||'Versand'}</td><td class="right">1</td><td class="right">€ ${o.versand.toFixed(2).replace('.',',')}</td><td class="right">€ ${o.versand.toFixed(2).replace('.',',')}</td></tr>`:''}
          <tr class="inv-total"><td colspan="4"><strong>Gesamtbetrag</strong></td><td class="right"><strong>€ ${gesamt.toFixed(2).replace('.',',')}</strong></td></tr>
        </tbody></table>
        <div class="inv-payment"><h4>Zahlungsinformation – Banküberweisung</h4>
          <div class="inv-pay-grid"><table class="inv-pay-table">
            <tr><td>Empfänger:</td><td>${empf}</td></tr>
            <tr><td>IBAN:</td><td>${BANK.iban||''}</td></tr>
            <tr><td>BIC:</td><td>${BANK.bic||''}</td></tr>
            <tr><td>Betrag:</td><td>€ ${gesamt.toFixed(2).replace('.',',')}</td></tr>
            <tr><td>Verwendungszweck:</td><td>${vzweck}</td></tr>
          </table><div class="inv-qr" id="invoiceQR"></div></div></div>
        <div class="inv-footer"><p>Pfadfinder*innengruppe Völs · Buch 1, 6176 Völs · Mitglied der PPÖ · Landesverband Tirol · baustein.pfadivoels.at</p></div>
        <div class="inv-actions"><button class="btn btn-primary" onclick="window.print()">🖨️ Drucken / PDF</button>
        <button class="btn btn-secondary" style="margin-left:.5rem" onclick="closeInvoice()">Schließen</button></div></div>`;
      el.classList.add('open');
      if(iban){
        const epc=['BCD','002','1','SCT',bic,empf,iban,'EUR'+gesamt.toFixed(2),'','',vzweck,''].join('\n');
        const qrEl=document.getElementById('invoiceQR');
        const qrImg=document.createElement('img');
        qrImg.width=150;qrImg.height=150;qrImg.alt='EPC QR Code';
        qrImg.src='https://api.qrserver.com/v1/create-qr-code/?size=150x150&data='+encodeURIComponent(epc);
        qrEl.appendChild(qrImg);
        const s=document.createElement('small');s.textContent='QR-Code scannen zum Bezahlen';
        s.style.cssText='font-size:.7rem;color:var(--grau-l);margin-top:.3rem;display:block;text-align:center';qrEl.appendChild(s);
      }
    }
    function closeInvoice(){document.getElementById('invoiceOverlay').classList.remove('open');}


    function exportCSV(){
      let csv='Nr;Datum;Vorname;Nachname;Email;Anzahl;Zustellung;Versand;Gesamt;Status;Adresse;Anmerkung\n';
      orders.forEach(o=>{const g=o.anzahl*PRICE+(o.versand||0);const d=o.created_at?new Date(o.created_at+'Z').toLocaleDateString('de-AT'):'';
        csv+=[o.id,d,o.vorname,o.nachname,o.email,o.anzahl,SHIP_LABEL[o.zustellung]||o.zustellung,o.versand||0,g,o.status,'"'+(o.adresse||'').replace(/"/g,'""')+'"','"'+(o.anmerkung||'').replace(/"/g,'""')+'"'].join(';')+'\n';});
      const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
      const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='bausteinaktion_bestellungen.csv';a.click();
    }
    document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeInvoice();}});
  </script>
</body>
</html>
